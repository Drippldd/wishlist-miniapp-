<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Вишлист</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #FF6B00;
      --orange-light: #FFF0E5;
      --red: #FF3B30;
      --red-light: #FFE5E5;
      --text-dark: #1A1A1A;
      --text-gray: #666666;
      --border: #EEEEEE;
      --white: #FFFFFF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #FEFAF5;
      padding: 16px;
      padding-bottom: 40px;
    }

    .header { margin-bottom: 20px; }
    .header h1 { font-size: 28px; font-weight: 700; color: var(--text-dark); }
    .header p { color: var(--text-gray); font-size: 13px; margin-top: 4px; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--white);
      padding: 4px;
      border-radius: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      border-radius: 36px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-gray);
    }

    .tab.active {
      background: var(--orange);
      color: white;
    }

    .add-form {
      background: var(--white);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 10px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    .file-picker-btn {
      background: var(--orange-light);
      color: var(--orange);
      padding: 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: inline-block;
      width: 100%;
      text-align: center;
      margin-bottom: 10px;
      border: 1.5px dashed var(--orange);
    }

    .photo-preview {
      margin: 10px 0;
      text-align: center;
    }

    .photo-preview img {
      max-width: 100%;
      max-height: 170px;
      border-radius: 16px;
    }

    .upload-status {
      font-size: 13px;
      color: var(--orange);
      text-align: center;
      margin: 8px 0 12px;
      font-weight: 600;
    }

    .add-btn {
      background: var(--orange);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }

    .add-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .gift-card {
      background: var(--white);
      border-radius: 24px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .gift-card-content {
      display: flex;
      padding: 14px;
      gap: 14px;
      cursor: pointer;
    }

    .gift-image {
      width: 100px;
      height: 100px;
      background: #F5F5F5;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .gift-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reserved-badge {
      position: absolute;
      right: 6px;
      top: 6px;
      background: #34C759;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 4px 7px;
      border-radius: 999px;
      z-index: 2;
    }

    .gift-details { flex: 1; }

    .gift-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .gift-price {
      font-weight: 700;
      font-size: 20px;
      color: var(--orange);
      margin-bottom: 8px;
    }

    .gift-desc {
      font-size: 12px;
      color: var(--text-gray);
      margin-bottom: 8px;
    }

    .gift-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .delete-btn, .link-btn {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--orange);
    }

    .delete-btn {
      background: var(--red-light);
      color: var(--red);
      border-color: var(--red);
    }

    .link-btn {
      background: var(--orange-light);
      color: var(--orange);
    }

    .link-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .friend-card {
      background: var(--white);
      border-radius: 20px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .friend-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 22px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .friend-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .friend-info { flex: 1; }
    .friend-name { font-weight: 700; font-size: 16px; }
    .friend-username { font-size: 12px; color: var(--text-gray); }

    .empty, .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-gray);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      margin: 40px auto;
      max-width: 420px;
    }

    .modal-image {
      width: 100%;
      height: 260px;
      background: #F5F5F5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      position: relative;
    }

    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-info { padding: 20px; }

    .modal-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .modal-price {
      font-size: 20px;
      font-weight: 800;
      color: var(--orange);
      margin-bottom: 10px;
    }

    .modal-desc {
      color: var(--text-gray);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-btn {
      flex: 1;
      border: none;
      border-radius: 18px;
      padding: 12px;
      font-weight: 700;
      color: white;
      background: var(--orange);
      cursor: pointer;
    }

    .modal-btn:disabled {
      background: #777;
      cursor: not-allowed;
    }

    .close-modal {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>🎁 Мой вишлист</h1>
    <p>Подарки, которые я хочу получить</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('my')">Мои подарки</div>
    <div class="tab" onclick="switchTab('friends')">Друзья</div>
  </div>

  <div id="mySection">
    <div class="add-form">
      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
      <button class="file-picker-btn" onclick="document.getElementById('photoInput').click()">📸 Выбрать фото</button>

      <div id="photoPreview" class="photo-preview"></div>
      <div id="uploadStatus" class="upload-status"></div>

      <input type="text" id="itemName" placeholder="Название подарка">
      <input type="text" id="itemPrice" placeholder="Цена">
      <input type="text" id="itemLink" placeholder="Ссылка где купить">
      <textarea id="itemDesc" placeholder="Описание подарка"></textarea>

      <button id="addGiftBtn" class="add-btn" onclick="addGift()">+ Добавить подарок</button>
    </div>

    <div id="myList">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <div id="friendsSection" style="display:none;">
    <div id="friendsList">
      <div class="loading">Загрузка друзей...</div>
    </div>
  </div>

  <div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <button class="close-modal" onclick="closeModal()">×</button>
    <div class="modal-content">
      <div class="modal-image" id="modalImage">🎁</div>
      <div class="modal-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-buttons" id="modalButtons"></div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_BASE = 'https://birthdaybot-production-2460.up.railway.app';

    const tgUser = tg.initDataUnsafe?.user;
    const userId = tgUser?.id;

    let myWishlist = [];
    let friendsList = [];
    let currentFriend = null;
    let currentFriendWishlist = [];
    let selectedPhotoUrl = '';
    let isPhotoUploading = false;

    if (!userId) {
      alert('Ошибка: открой Mini App через Telegram-бота');
    } else {
      loadMyWishlist();
      loadFriendsList();
    }

    function setAddButtonState() {
      const btn = document.getElementById('addGiftBtn');

      if (isPhotoUploading) {
        btn.disabled = true;
        btn.innerText = '⏳ Фото загружается...';
      } else {
        btn.disabled = false;
        btn.innerText = '+ Добавить подарок';
      }
    }

    async function compressImage(file, maxWidth = 1200, quality = 0.75) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = function(e) {
          img.src = e.target.result;
        };

        img.onload = function() {
          const canvas = document.createElement('canvas');

          let width = img.width;
          let height = img.height;

          if (width > maxWidth) {
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          canvas.toBlob(
            blob => {
              if (!blob) {
                reject(new Error('Не удалось сжать фото'));
                return;
              }

              const compressedFile = new File(
                [blob],
                file.name.replace(/\.\w+$/, '.jpg'),
                { type: 'image/jpeg' }
              );

              resolve(compressedFile);
            },
            'image/jpeg',
            quality
          );
        };

        img.onerror = reject;
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadPhoto(input) {
      const originalFile = input.files[0];
      if (!originalFile) return;

      const status = document.getElementById('uploadStatus');
      const preview = document.getElementById('photoPreview');

      selectedPhotoUrl = '';
      isPhotoUploading = true;
      setAddButtonState();

      if (!originalFile.type.startsWith('image/')) {
        status.innerHTML = '❌ Выбери именно фото';
        isPhotoUploading = false;
        setAddButtonState();
        return;
      }

      status.innerHTML = '⏳ Сжимаем фото...';

      try {
        const compressedFile = await compressImage(originalFile);

        const reader = new FileReader();
        reader.onload = function(e) {
          preview.innerHTML = `<img src="${e.target.result}" alt="Фото подарка">`;
        };
        reader.readAsDataURL(compressedFile);

        status.innerHTML = '⏳ Загружаем фото...';

        const formData = new FormData();
        formData.append('file', compressedFile);

        const res = await fetch(`${API_BASE}/upload_photo`, {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (!res.ok) throw new Error('Ошибка сервера при загрузке фото');
        if (!data.url) throw new Error('Сервер не вернул ссылку на фото');

        selectedPhotoUrl = data.url;
        status.innerHTML = '✅ Фото загружено';
      } catch (e) {
        console.error('Ошибка фото:', e);
        selectedPhotoUrl = '';
        status.innerHTML = '❌ Фото не загрузилось: ' + e.message;
      } finally {
        isPhotoUploading = false;
        setAddButtonState();
      }
    }

    async function addGift() {
      const name = document.getElementById('itemName').value.trim();
      const priceRaw = document.getElementById('itemPrice').value.trim();
      const link = document.getElementById('itemLink').value.trim();
      const description = document.getElementById('itemDesc').value.trim();

      if (isPhotoUploading) {
        alert('Подожди, фото ещё загружается');
        return;
      }

      if (!name) {
        alert('Введите название подарка');
        return;
      }

      const giftData = {
        gift_name: name,
        price: priceRaw ? parseInt(priceRaw.replace(/\D/g, ''), 10) || 0 : 0,
        photo_url: selectedPhotoUrl || '',
        gift_link: link,
        description: description,
        visibility: 'all'
      };

      try {
        const res = await fetch(`${API_BASE}/wishlist/${userId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(giftData)
        });

        if (!res.ok) throw new Error('Ошибка добавления подарка');

        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemLink').value = '';
        document.getElementById('itemDesc').value = '';
        document.getElementById('photoInput').value = '';
        document.getElementById('photoPreview').innerHTML = '';
        document.getElementById('uploadStatus').innerHTML = '';

        selectedPhotoUrl = '';

        await loadMyWishlist();
        tg.showAlert('Подарок добавлен 🎉');
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function loadMyWishlist() {
      try {
        const res = await fetch(`${API_BASE}/wishlist/${userId}`);
        const data = await res.json();

        myWishlist = Array.isArray(data) ? data.map(mapGift) : [];
        renderMyWishlist();
      } catch (e) {
        document.getElementById('myList').innerHTML = '<div class="empty">Ошибка загрузки</div>';
      }
    }

    function mapGift(item) {
      return {
        id: item.id,
        name: item.gift_name || item.name || 'Без названия',
        price: item.price || 0,
        link: item.gift_link || '',
        photo_url: item.photo_url || '',
        description: item.description || '',
        reserved_by: item.reserved_by ?? null,
        is_reserved: Boolean(item.is_reserved)
      };
    }

    function renderMyWishlist() {
      const container = document.getElementById('myList');

      if (!myWishlist.length) {
        container.innerHTML = '<div class="empty">🎄 Пока нет подарков</div>';
        return;
      }

      container.innerHTML = myWishlist.map((item, index) => `
        <div class="gift-card">
          <div class="gift-card-content" onclick="openMyModal(${index})">
            <div class="gift-image">
              ${renderGiftImage(item)}
            </div>

            <div class="gift-details">
              <div class="gift-title">${escapeHtml(item.name)}</div>
              <div class="gift-price">${escapeHtml(item.price)} ₽</div>

              ${item.description ? `<div class="gift-desc">${escapeHtml(item.description)}</div>` : ''}

              <div class="gift-actions">
                ${item.link ? `<button class="link-btn" onclick="event.stopPropagation(); openLink('${escapeAttr(item.link)}')">🛒 Перейти</button>` : ''}
                <button class="delete-btn" onclick="event.stopPropagation(); deleteGift(${item.id}, ${index})">🗑 Удалить</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openMyModal(index) {
      const item = myWishlist[index];
      if (!item) return;

      document.getElementById('modalTitle').innerText = item.name;
      document.getElementById('modalPrice').innerText = `${item.price} ₽`;
      document.getElementById('modalDesc').innerText = item.description || 'Нет описания';
      document.getElementById('modalImage').innerHTML = renderGiftImage(item);

      document.getElementById('modalButtons').innerHTML = `
        ${item.link ? `<button class="modal-btn" onclick="openLink('${escapeAttr(item.link)}')">🛒 Перейти</button>` : ''}
        <button class="modal-btn" style="background:#FF3B30" onclick="deleteGift(${item.id}, ${index}); closeModal();">🗑 Удалить</button>
      `;

      document.getElementById('modal').style.display = 'block';
    }

    async function deleteGift(giftId, index) {
      if (!confirm('Удалить подарок?')) return;

      try {
        const res = await fetch(`${API_BASE}/wishlist/${userId}/${giftId}`, {
          method: 'DELETE'
        });

        if (!res.ok) throw new Error('Ошибка удаления');

        myWishlist.splice(index, 1);
        renderMyWishlist();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function loadFriendsList() {
      try {
        const res = await fetch(`${API_BASE}/friends/${userId}`);
        const data = await res.json();

        friendsList = Array.isArray(data) ? data : [];
        renderFriendsList();
      } catch (e) {
        friendsList = [];
        renderFriendsList();
      }
    }

    function renderFriendsList() {
      const container = document.getElementById('friendsList');

      if (!friendsList.length) {
        container.innerHTML = '<div class="empty">👋 Пока нет друзей</div>';
        return;
      }

      container.innerHTML = friendsList.map(friend => {
        const friendId = friend.user_id || friend.id;
        const name = friend.first_name || friend.name || 'Друг';
        const username = friend.username || '';
        const photo = friend.photo_url || '';

        return `
          <div class="friend-card" onclick="loadFriendWishlist(${friendId}, '${escapeAttr(name)}', '${escapeAttr(username)}')">
            <div class="friend-avatar">
              ${photo ? `<img src="${escapeAttr(photo)}" onerror="this.parentElement.innerHTML='${escapeAttr(name[0] || '?')}'">` : escapeHtml(name[0] || '?')}
            </div>

            <div class="friend-info">
              <div class="friend-name">${escapeHtml(name)}</div>
              ${username ? `<div class="friend-username">@${escapeHtml(username)}</div>` : ''}
            </div>

            <div style="color:var(--orange);font-size:24px;">›</div>
          </div>
        `;
      }).join('');
    }

    async function loadFriendWishlist(friendId, friendName, friendUsername) {
      currentFriend = {
        id: friendId,
        name: friendName,
        username: friendUsername
      };

      document.querySelector('.header').innerHTML = `
        <h1>🎁 Вишлист</h1>
        <p>${escapeHtml(friendName)}</p>
      `;

      const container = document.getElementById('friendsList');
      container.innerHTML = '<div class="loading">Загрузка подарков...</div>';

      try {
        const res = await fetch(`${API_BASE}/wishlist/${friendId}`);
        const data = await res.json();

        currentFriendWishlist = Array.isArray(data) ? data.map(mapGift) : [];
        renderFriendWishlist();
      } catch (e) {
        container.innerHTML = '<div class="empty">Ошибка загрузки вишлиста друга</div>';
      }
    }

    function renderFriendWishlist() {
      const container = document.getElementById('friendsList');

      if (!currentFriendWishlist.length) {
        container.innerHTML = `
          <button class="add-btn" onclick="backToFriends()">← Назад к друзьям</button>
          <div class="empty">🎁 У ${escapeHtml(currentFriend.name)} пока нет подарков</div>
        `;
        return;
      }

      container.innerHTML = `
        <button class="add-btn" style="margin-bottom:16px;" onclick="backToFriends()">← Назад к друзьям</button>

        ${currentFriendWishlist.map((item, index) => {
          const isReservedByMe = String(item.reserved_by) === String(userId);
          const isReservedByOther = item.reserved_by !== null && item.reserved_by !== undefined && String(item.reserved_by) !== String(userId);
          const isReserved = isReservedByMe || isReservedByOther;

          return `
            <div class="gift-card">
              <div class="gift-card-content" onclick="openFriendModal(${index})">
                <div class="gift-image">
                  ${renderGiftImage(item, isReservedByMe ? 'Ваш резерв' : isReservedByOther ? 'Занято' : '')}
                </div>

                <div class="gift-details">
                  <div class="gift-title">${escapeHtml(item.name)}</div>
                  <div class="gift-price">${escapeHtml(item.price)} ₽</div>

                  ${item.description ? `<div class="gift-desc">${escapeHtml(item.description)}</div>` : ''}

                  <div class="gift-actions">
                    ${renderReserveButton(item, isReserved, isReservedByMe)}

                    <button class="link-btn" onclick="event.stopPropagation(); copyToMe(${item.id})">📋 Добавить к себе</button>

                    ${item.link ? `<button class="link-btn" onclick="event.stopPropagation(); openLink('${escapeAttr(item.link)}')">🛒 Перейти</button>` : ''}
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      `;
    }

    function renderReserveButton(item, isReserved, isReservedByMe) {
      if (!isReserved) {
        return `<button class="link-btn" onclick="event.stopPropagation(); reserveGift(${item.id}, ${currentFriend.id})">🎁 Забронировать</button>`;
      }

      if (isReservedByMe) {
        return `<button class="delete-btn" onclick="event.stopPropagation(); unreserveGift(${item.id}, ${currentFriend.id})">❌ Убрать резерв</button>`;
      }

      return `<button class="link-btn" disabled>✅ Занято</button>`;
    }

    function openFriendModal(index) {
      const item = currentFriendWishlist[index];
      if (!item) return;

      const isReservedByMe = String(item.reserved_by) === String(userId);
      const isReservedByOther = item.reserved_by !== null && item.reserved_by !== undefined && String(item.reserved_by) !== String(userId);
      const isReserved = isReservedByMe || isReservedByOther;

      document.getElementById('modalTitle').innerText = item.name;
      document.getElementById('modalPrice').innerText = `${item.price} ₽`;
      document.getElementById('modalDesc').innerText = item.description || 'Нет описания';
      document.getElementById('modalImage').innerHTML = renderGiftImage(item, isReservedByMe ? 'Ваш резерв' : isReservedByOther ? 'Занято' : '');

      document.getElementById('modalButtons').innerHTML = `
        ${renderModalReserveButton(item, isReserved, isReservedByMe)}
        <button class="modal-btn" onclick="copyToMe(${item.id}); closeModal();">📋 Добавить к себе</button>
        ${item.link ? `<button class="modal-btn" onclick="openLink('${escapeAttr(item.link)}')">🛒 Перейти</button>` : ''}
      `;

      document.getElementById('modal').style.display = 'block';
    }

    function renderModalReserveButton(item, isReserved, isReservedByMe) {
      if (!isReserved) {
        return `<button class="modal-btn" onclick="reserveGift(${item.id}, ${currentFriend.id}); closeModal();">🎁 Забронировать</button>`;
      }

      if (isReservedByMe) {
        return `<button class="modal-btn" style="background:#FF3B30" onclick="unreserveGift(${item.id}, ${currentFriend.id}); closeModal();">❌ Убрать резерв</button>`;
      }

      return `<button class="modal-btn" disabled>✅ Занято</button>`;
    }

    async function reserveGift(giftId, friendId) {
      const url = `${API_BASE}/wishlist/${friendId}/${giftId}/reserve`;

      try {
        alert('Пробую забронировать\nURL: ' + url);

        const res = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({})
        });

        const text = await res.text();

        alert(
          'STATUS: ' + res.status +
          '\nANSWER: ' + text
        );

        if (!res.ok) {
          return;
        }

        await loadFriendWishlist(
          currentFriend.id,
          currentFriend.name,
          currentFriend.username
        );
      } catch (e) {
        alert('FETCH ERROR: ' + e.name + '\n' + e.message);
      }
    }

    async function unreserveGift(giftId, friendId) {
      try {
        const res = await fetch(`${API_BASE}/wishlist/${friendId}/${giftId}/reserve?user_id=${userId}`, {
          method: 'DELETE'
        });

        if (!res.ok) throw new Error('Ошибка снятия резерва');

        await loadFriendWishlist(currentFriend.id, currentFriend.name, currentFriend.username);
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function copyToMe(giftId) {
      const gift = currentFriendWishlist.find(g => g.id === giftId);
      if (!gift) return;

      const giftData = {
        gift_name: gift.name,
        price: parseInt(gift.price, 10) || 0,
        photo_url: gift.photo_url || '',
        gift_link: gift.link || '',
        description: gift.description || '',
        visibility: 'all'
      };

      try {
        const res = await fetch(`${API_BASE}/wishlist/${userId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(giftData)
        });

        if (!res.ok) throw new Error('Ошибка добавления');

        tg.showAlert('Подарок добавлен к тебе ✨');
        await loadMyWishlist();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    function backToFriends() {
      currentFriend = null;
      currentFriendWishlist = [];

      document.querySelector('.header').innerHTML = `
        <h1>👥 Вишлисты друзей</h1>
        <p>Выберите друга и посмотрите его подарки</p>
      `;

      renderFriendsList();
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((el, index) => {
        el.classList.toggle('active', tab === 'my' ? index === 0 : index === 1);
      });

      document.getElementById('mySection').style.display = tab === 'my' ? 'block' : 'none';
      document.getElementById('friendsSection').style.display = tab === 'friends' ? 'block' : 'none';

      if (tab === 'my') {
        currentFriend = null;
        currentFriendWishlist = [];

        document.querySelector('.header').innerHTML = `
          <h1>🎁 Мой вишлист</h1>
          <p>Подарки, которые я хочу получить</p>
        `;
      } else {
        currentFriend = null;
        currentFriendWishlist = [];

        document.querySelector('.header').innerHTML = `
          <h1>👥 Вишлисты друзей</h1>
          <p>Выберите друга и посмотрите его подарки</p>
        `;

        loadFriendsList();
      }
    }

    function renderGiftImage(item, badgeText = '') {
      const image = item.photo_url
        ? `<img src="${escapeAttr(item.photo_url)}" onerror="this.parentElement.innerHTML='🎁'">`
        : '🎁';

      const badge = badgeText
        ? `<span class="reserved-badge">${escapeHtml(badgeText)}</span>`
        : '';

      return `${image}${badge}`;
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function openLink(url) {
      if (!url) return;

      if (tg.openLink) {
        tg.openLink(url);
      } else {
        window.open(url, '_blank');
      }
    }

    function escapeHtml(value) {
      if (!value) return '';
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
