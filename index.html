<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вишлист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            padding: 20px;
            padding-bottom: 40px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        /* Вкладки */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: white;
            padding: 6px;
            border-radius: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 28px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            color: #8e8e93;
        }
        .tab.active {
            background: #007aff;
            color: white;
        }
        /* Карточка */
        .card {
            background: white;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.1s;
            cursor: pointer;
        }
        .card:active { transform: scale(0.98); }
        .card-content {
            display: flex;
            padding: 16px;
            gap: 16px;
        }
        .card-photo {
            width: 80px;
            height: 80px;
            background: #e5e5ea;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-info {
            flex: 1;
        }
        .card-name {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 4px;
        }
        .card-price {
            color: #007aff;
            font-weight: 600;
            font-size: 16px;
            margin-top: 6px;
        }
        .card-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .small-btn {
            background: #f2f2f7;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #007aff;
            cursor: pointer;
            border: none;
        }
        .small-btn.danger { color: #ff3b30; }
        /* Друзья список */
        .friend-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .friend-avatar {
            width: 50px;
            height: 50px;
            background: #007aff;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 400px;
            margin: 60px auto;
            overflow: hidden;
        }
        .modal-photo {
            width: 100%;
            height: 250px;
            background: #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }
        .modal-info {
            padding: 20px;
        }
        .modal-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .modal-price {
            font-size: 20px;
            color: #007aff;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .modal-desc {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .big-btn {
            flex: 1;
            background: #007aff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .big-btn.gray { background: #8e8e93; }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            font-size: 24px;
            cursor: pointer;
        }
        .loading, .empty {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
        }
        .add-section {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .add-section input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>🎁 Вишлист</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('my')">🎁 Мои подарки</div>
        <div class="tab" onclick="switchTab('friends')">👥 Друзья</div>
    </div>
    
    <div id="mySection">
        <div class="add-section">
            <input type="text" id="itemName" placeholder="Название подарка">
            <input type="text" id="itemPrice" placeholder="Цена">
            <button onclick="addGift()">➕ Добавить подарок</button>
        </div>
        <div id="myList"><div class="loading">Загрузка...</div></div>
    </div>
    
    <div id="friendsSection" style="display:none;">
        <div id="friendsList"><div class="loading">Загрузка друзей...</div></div>
    </div>
    
    <!-- Модальное окно -->
    <div id="modal" class="modal" onclick="if(event.target===this) closeModal()">
        <button class="close-modal" onclick="closeModal()">✕</button>
        <div class="modal-content">
            <div class="modal-photo" id="modalPhoto">🎁</div>
            <div class="modal-info">
                <div class="modal-name" id="modalName"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <div class="modal-buttons" id="modalButtons"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id;
        const API_BASE = 'https://birthdaybot-production-2460.up.railway.app';
        
        let myWishlist = [];
        let friendsList = [];
        let currentFriendId = null;
        let currentFriendWishlist = [];
        
        if (!userId) {
            alert('Ошибка: не определён пользователь');
        } else {
            loadMyWishlist();
            loadFriendsList();
        }
        
        async function loadMyWishlist() {
            try {
                const res = await fetch(`${API_BASE}/wishlist/${userId}`);
                const data = await res.json();
                myWishlist = Array.isArray(data) ? data.map(item => ({
                    id: item.id,
                    name: item.gift_name,
                    price: item.price || 'не указана',
                    link: item.gift_link || '',
                    photo_url: item.photo_url || '',
                    description: item.description || ''
                })) : [];
                renderMyWishlist();
            } catch(e) {
                document.getElementById('myList').innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
            }
        }
        
        function renderMyWishlist() {
            const container = document.getElementById('myList');
            if (!myWishlist.length) {
                container.innerHTML = '<div class="empty">🎄 Пока нет подарков</div>';
                return;
            }
            container.innerHTML = myWishlist.map((item, i) => `
                <div class="card" onclick="openModal(${i}, 'my')">
                    <div class="card-content">
                        <div class="card-photo">
                            ${item.photo_url ? `<img src="${item.photo_url}" onerror="this.parentElement.innerHTML='🎁'">` : '🎁'}
                        </div>
                        <div class="card-info">
                            <div class="card-name">${escapeHtml(item.name)}</div>
                            <div class="card-price">${item.price} ₽</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadFriendsList() {
            try {
                const res = await fetch(`${API_BASE}/friends/${userId}`);
                const data = await res.json();
                friendsList = Array.isArray(data) ? data : [];
                renderFriendsList();
            } catch(e) {
                document.getElementById('friendsList').innerHTML = '<div class="empty">❌ Ошибка загрузки друзей</div>';
            }
        }
        
        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            if (!friendsList.length) {
                container.innerHTML = '<div class="empty">👋 Пока нет друзей</div>';
                return;
            }
            container.innerHTML = friendsList.map(friend => `
                <div class="friend-card" onclick="loadFriendWishlist(${friend.user_id}, '${escapeHtml(friend.first_name)}')">
                    <div class="friend-avatar">${(friend.first_name?.[0] || '?').toUpperCase()}</div>
                    <div style="flex:1">
                        <strong>${escapeHtml(friend.first_name || 'Друг')}</strong>
                        ${friend.username ? `<div style="font-size:12px;color:#8e8e93">@${friend.username}</div>` : ''}
                    </div>
                    <div>→</div>
                </div>
            `).join('');
        }
        
        async function loadFriendWishlist(friendId, friendName) {
            currentFriendId = friendId;
            try {
                const res = await fetch(`${API_BASE}/wishlist/${friendId}`);
                const data = await res.json();
                currentFriendWishlist = Array.isArray(data) ? data.map(item => ({
                    id: item.id,
                    name: item.gift_name,
                    price: item.price || 'не указана',
                    link: item.gift_link || '',
                    photo_url: item.photo_url || '',
                    description: item.description || '',
                    ownerId: friendId,
                    ownerName: friendName
                })) : [];
                renderFriendsWishlist();
            } catch(e) {
                document.getElementById('friendsList').innerHTML = '<div class="empty">❌ Ошибка загрузки подарков друга</div>';
            }
        }
        
        function renderFriendsWishlist() {
            const container = document.getElementById('friendsList');
            if (!currentFriendWishlist.length) {
                container.innerHTML = `<div class="empty">🎁 У ${escapeHtml(currentFriendWishlist[0]?.ownerName || 'друга')} пока нет подарков</div><button onclick="loadFriendsList()" style="margin-top:16px;">← Назад к друзьям</button>`;
                return;
            }
            container.innerHTML = `
                <button onclick="loadFriendsList()" style="margin-bottom:16px;">← Назад к друзьям</button>
                ${currentFriendWishlist.map((item, i) => `
                    <div class="card">
                        <div class="card-content">
                            <div class="card-photo">${item.photo_url ? `<img src="${item.photo_url}" onerror="this.parentElement.innerHTML='🎁'">` : '🎁'}</div>
                            <div class="card-info">
                                <div class="card-name">${escapeHtml(item.name)}</div>
                                <div class="card-price">${item.price} ₽</div>
                                <div class="card-buttons">
                                    <button class="small-btn" onclick="event.stopPropagation(); reserveGift(${item.id})">🎁 Хочу подарить</button>
                                    <button class="small-btn" onclick="event.stopPropagation(); copyToMe(${item.id})">📋 Добавить к себе</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;
        }
        
        async function addGift() {
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            if (!name) { alert('Введите название'); return; }
            try {
                await fetch(`${API_BASE}/wishlist/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gift_name: name, price: price ? parseInt(price) : 0, visibility: "all" })
                });
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                await loadMyWishlist();
            } catch(e) { alert('Ошибка добавления'); }
        }
        
        function openModal(index, type) {
            const item = type === 'my' ? myWishlist[index] : currentFriendWishlist[index];
            if (!item) return;
            document.getElementById('modalName').innerText = item.name;
            document.getElementById('modalPrice').innerText = `${item.price} ₽`;
            document.getElementById('modalDesc').innerText = item.description || 'Нет описания';
            document.getElementById('modalPhoto').innerHTML = item.photo_url ? `<img src="${item.photo_url}" style="width:100%;height:100%;object-fit:cover">` : '🎁';
            
            const buttonsDiv = document.getElementById('modalButtons');
            if (type === 'my') {
                buttonsDiv.innerHTML = `<button class="big-btn" onclick="window.open('${item.link || '#'}', '_blank')">🛒 Где купить</button>`;
            } else {
                buttonsDiv.innerHTML = `
                    <button class="big-btn" onclick="reserveGift(${item.id}); closeModal();">🎁 Хочу подарить</button>
                    <button class="big-btn" onclick="copyToMe(${item.id}); closeModal();">📋 Добавить к себе</button>
                    ${item.link ? `<button class="big-btn gray" onclick="window.open('${item.link}', '_blank')">🛒 Где купить</button>` : ''}
                `;
            }
            document.getElementById('modal').style.display = 'block';
        }
        
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        async function reserveGift(wishlistId) {
            alert(`Функция резерва подарка ${wishlistId} будет работать, когда Саша добавит эндпоинт /reserve_gift`);
        }
        
        async function copyToMe(wishlistId) {
            alert(`Копирование подарка ${wishlistId} будет работать после доработки API`);
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'my' && i === 0) || (tab === 'friends' && i === 1));
            });
            document.getElementById('mySection').style.display = tab === 'my' ? 'block' : 'none';
            document.getElementById('friendsSection').style.display = tab === 'friends' ? 'block' : 'none';
            if (tab === 'friends') loadFriendsList();
        }
        
        function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    </script>
</body>
</html>
