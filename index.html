<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой вишлист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f2f2f7;
            padding: 20px;
            padding-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 24px;
            border-left: 3px solid #007aff;
            padding-left: 12px;
        }

        .add-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .add-section input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            background: #f9f9fb;
            transition: border-color 0.2s;
        }

        .add-section input:focus {
            outline: none;
            border-color: #007aff;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.05s;
        }

        button:active {
            transform: scale(0.97);
        }

        .delete-btn {
            background: #ff3b30;
            padding: 8px 16px;
            font-size: 14px;
        }

        .save-btn {
            background: #34c759;
            width: 100%;
            padding: 16px;
            font-size: 17px;
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(52, 199, 89, 0.3);
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }

        .card:active {
            transform: scale(0.99);
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-weight: 600;
            font-size: 17px;
            color: #000;
            margin-bottom: 4px;
        }

        .card-price {
            color: #8e8e93;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            color: #8e8e93;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            margin-top: 20px;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <h1>
        <span>🎁</span> Мой вишлист
    </h1>
    <div class="subtitle">Подарки, которые я хочу получить</div>

    <div class="add-section">
        <input type="text" id="itemName" placeholder="Название подарка (например, AirPods)">
        <input type="text" id="itemPrice" placeholder="Цена (например, 15 000 ₽)">
        <div class="button-group">
            <button onclick="addItem()" style="flex: 1;">➕ Добавить подарок</button>
        </div>
    </div>

    <div id="list"></div>

    <button class="save-btn" onclick="sendToBot()">💾 Сохранить вишлист в боте</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        let wishlist = [];

        // Защита от XSS (чтобы нельзя было вставить вредоносный код)
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function render() {
            const container = document.getElementById('list');
            
            if (wishlist.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span>🎄</span>
                        Пока нет подарков<br>
                        Добавьте первый выше
                    </div>
                `;
                return;
            }
            
            container.innerHTML = wishlist.map((item, index) => `
                <div class="card">
                    <div class="card-info">
                        <div class="card-name">${escapeHtml(item.name)}</div>
                        <div class="card-price">${escapeHtml(item.price)} ₽</div>
                    </div>
                    <button class="delete-btn" onclick="removeItem(${index})">🗑 Удалить</button>
                </div>
            `).join('');
        }

        function addItem() {
            const nameInput = document.getElementById('itemName');
            const priceInput = document.getElementById('itemPrice');
            const name = nameInput.value.trim();
            const price = priceInput.value.trim();
            
            if (name === '') {
                // Встряхиваем поле ввода
                nameInput.style.transform = 'shake 0.3s';
                setTimeout(() => { nameInput.style.transform = ''; }, 300);
                alert('Введите название подарка');
                return;
            }
            
            wishlist.push({ 
                name: name, 
                price: price || 'не указана' 
            });
            render();
            
            // Очищаем поля
            nameInput.value = '';
            priceInput.value = '';
            nameInput.focus();
        }

        function removeItem(index) {
            wishlist.splice(index, 1);
            render();
        }

        function sendToBot() {
            if (wishlist.length === 0) {
                alert('Сначала добавьте хотя бы один подарок');
                return;
            }
            
            const data = {
                action: 'save_wishlist',
                wishlist: wishlist,
                user_id: tg.initDataUnsafe?.user?.id || 'unknown',
                timestamp: new Date().toISOString()
            };
            
            tg.sendData(JSON.stringify(data));
            alert(`✅ Отправлено боту ${wishlist.length} подарков!`);
        }
    </script>
</body>
</html>
