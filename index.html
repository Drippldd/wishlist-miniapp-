<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой вишлист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #FEFAF5;
            padding: 20px;
            padding-bottom: 40px;
        }

        /* Бело-оранжевая палитра */
        :root {
            --orange: #FF7A2F;
            --orange-dark: #E55A1F;
            --orange-light: #FFF2E6;
            --orange-soft: #FFE4D6;
            --text-dark: #1A1A1A;
            --text-gray: #7A7A7A;
            --text-light: #B0B0B0;
            --border: #F0EBE5;
            --white: #FFFFFF;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        /* Хедер */
        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-gray);
            font-size: 15px;
            margin-top: 6px;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            background: var(--white);
            padding: 5px;
            border-radius: 60px;
            box-shadow: var(--shadow);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            color: var(--text-gray);
        }

        .tab.active {
            background: var(--orange);
            color: white;
            box-shadow: 0 2px 8px rgba(255, 122, 47, 0.3);
        }

        /* Карточка подарка (как в ohmywishes) */
        .gift-card {
            background: var(--white);
            border-radius: 24px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .gift-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-hover);
        }

        .gift-card-content {
            display: flex;
            padding: 16px;
            gap: 16px;
        }

        .gift-image {
            width: 100px;
            height: 100px;
            background: var(--orange-light);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .gift-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gift-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .gift-title {
            font-weight: 700;
            font-size: 18px;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .gift-price {
            font-weight: 700;
            font-size: 17px;
            color: var(--orange);
            margin-top: 4px;
        }

        .gift-price span {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
        }

        /* Кнопки на карточке друга */
        .gift-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .action-btn {
            background: var(--orange-light);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: var(--orange);
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: var(--orange-soft);
        }

        /* Список друзей */
        .friend-card {
            background: var(--white);
            border-radius: 20px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .friend-card:active {
            transform: scale(0.98);
        }

        .friend-avatar {
            width: 56px;
            height: 56px;
            background: var(--orange);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(255, 122, 47, 0.2);
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 700;
            font-size: 17px;
            color: var(--text-dark);
        }

        .friend-username {
            font-size: 13px;
            color: var(--text-gray);
            margin-top: 2px;
        }

        .friend-arrow {
            color: var(--orange);
            font-size: 20px;
        }

        /* Форма добавления */
        .add-form {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }

        .add-form input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: 18px;
            font-size: 16px;
            margin-bottom: 12px;
            background: var(--white);
            transition: all 0.2s;
        }

        .add-form input:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px var(--orange-light);
        }

        .add-btn {
            background: var(--orange);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-btn:active {
            transform: scale(0.97);
            background: var(--orange-dark);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--white);
            border-radius: 32px;
            max-width: 400px;
            margin: 60px auto;
            overflow: hidden;
        }

        .modal-image {
            width: 100%;
            height: 280px;
            background: var(--orange-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-info {
            padding: 24px;
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .modal-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--orange);
            margin-bottom: 16px;
        }

        .modal-desc {
            color: var(--text-gray);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .modal-btn {
            flex: 1;
            background: var(--orange);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }

        .modal-btn:active {
            transform: scale(0.97);
        }

        .modal-btn.gray {
            background: var(--text-gray);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            font-size: 28px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .back-btn {
            background: var(--orange-light);
            color: var(--orange);
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            margin-bottom: 16px;
            width: 100%;
            cursor: pointer;
            font-size: 15px;
        }

        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
            font-size: 15px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Мой вишлист</h1>
        <p>Подарки, которые я хочу получить</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('my')">🎁 Мои подарки</div>
        <div class="tab" onclick="switchTab('friends')">👥 Друзья</div>
    </div>

    <!-- Мои подарки -->
    <div id="mySection">
        <div class="add-form">
            <input type="text" id="itemName" placeholder="Название подарка">
            <input type="text" id="itemPrice" placeholder="Цена">
            <input type="text" id="itemLink" placeholder="Ссылка на подарок (необязательно)">
            <button class="add-btn" onclick="addGift()">➕ Добавить подарок</button>
        </div>
        <div id="myList"><div class="loading">Загрузка...</div></div>
    </div>

    <!-- Друзья -->
    <div id="friendsSection" style="display:none;">
        <div id="friendsList"><div class="loading">Загрузка друзей...</div></div>
    </div>

    <!-- Модалка -->
    <div id="modal" class="modal" onclick="if(event.target===this) closeModal()">
        <button class="close-modal" onclick="closeModal()">✕</button>
        <div class="modal-content">
            <div class="modal-image" id="modalImage">🎁</div>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <div class="modal-buttons" id="modalButtons"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id;
        const API_BASE = 'https://birthdaybot-production-2460.up.railway.app';
        
        let myWishlist = [];
        let friendsList = [];
        let currentFriendId = null;
        let currentFriendWishlist = [];
        
        if (!userId) {
            alert('Ошибка: не определён пользователь');
        } else {
            loadMyWishlist();
            loadFriendsList();
        }
        
        async function loadMyWishlist() {
            try {
                const res = await fetch(`${API_BASE}/wishlist/${userId}`);
                const data = await res.json();
                myWishlist = Array.isArray(data) ? data.map(item => ({
                    id: item.id,
                    name: item.gift_name,
                    price: item.price || 'не указана',
                    link: item.gift_link || '',
                    photo_url: item.photo_url || '',
                    description: item.description || ''
                })) : [];
                renderMyWishlist();
            } catch(e) {
                document.getElementById('myList').innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span>Ошибка загрузки</div>';
            }
        }
        
        function renderMyWishlist() {
            const container = document.getElementById('myList');
            if (!myWishlist.length) {
                container.innerHTML = '<div class="empty"><span class="empty-icon">🎄</span>Пока нет подарков</div>';
                return;
            }
            container.innerHTML = myWishlist.map((item, i) => `
                <div class="gift-card" onclick="openModal(${i}, 'my')">
                    <div class="gift-card-content">
                        <div class="gift-image">
                            ${item.photo_url ? `<img src="${item.photo_url}" onerror="this.parentElement.innerHTML='🎁'">` : '🎁'}
                        </div>
                        <div class="gift-details">
                            <div>
                                <div class="gift-title">${escapeHtml(item.name)}</div>
                                <div class="gift-price">${item.price} ₽ <span></span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadFriendsList() {
            try {
                const res = await fetch(`${API_BASE}/friends/${userId}`);
                const data = await res.json();
                friendsList = Array.isArray(data) ? data : [];
                renderFriendsList();
            } catch(e) {
                document.getElementById('friendsList').innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span>Ошибка загрузки друзей</div>';
            }
        }
        
        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            if (!friendsList.length) {
                container.innerHTML = '<div class="empty"><span class="empty-icon">👋</span>Пока нет друзей</div>';
                return;
            }
            container.innerHTML = friendsList.map(friend => `
                <div class="friend-card" onclick="loadFriendWishlist(${friend.user_id}, '${escapeHtml(friend.first_name || 'Друг')}')">
                    <div class="friend-avatar">${(friend.first_name?.[0] || '?').toUpperCase()}</div>
                    <div class="friend-info">
                        <div class="friend-name">${escapeHtml(friend.first_name || 'Друг')}</div>
                        ${friend.username ? `<div class="friend-username">@${friend.username}</div>` : ''}
                    </div>
                    <div class="friend-arrow">→</div>
                </div>
            `).join('');
        }
        
        async function loadFriendWishlist(friendId, friendName) {
            currentFriendId = friendId;
            try {
                const res = await fetch(`${API_BASE}/wishlist/${friendId}`);
                const data = await res.json();
                currentFriendWishlist = Array.isArray(data) ? data.map(item => ({
                    id: item.id,
                    name: item.gift_name,
                    price: item.price || 'не указана',
                    link: item.gift_link || '',
                    photo_url: item.photo_url || '',
                    description: item.description || '',
                    ownerId: friendId,
                    ownerName: friendName
                })) : [];
                renderFriendsWishlist();
            } catch(e) {
                document.getElementById('friendsList').innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span>Ошибка загрузки подарков</div>';
            }
        }
        
        function renderFriendsWishlist() {
            const container = document.getElementById('friendsList');
            if (!currentFriendWishlist.length) {
                container.innerHTML = `
                    <button class="back-btn" onclick="loadFriendsList()">← Назад к друзьям</button>
                    <div class="empty"><span class="empty-icon">🎁</span>У ${escapeHtml(currentFriendWishlist[0]?.ownerName || 'друга')} пока нет подарков</div>
                `;
                return;
            }
            container.innerHTML = `
                <button class="back-btn" onclick="loadFriendsList()">← Назад к друзьям</button>
                ${currentFriendWishlist.map((item, i) => `
                    <div class="gift-card">
                        <div class="gift-card-content">
                            <div class="gift-image">
                                ${item.photo_url ? `<img src="${item.photo_url}" onerror="this.parentElement.innerHTML='🎁'">` : '🎁'}
                            </div>
                            <div class="gift-details">
                                <div>
                                    <div class="gift-title">${escapeHtml(item.name)}</div>
                                    <div class="gift-price">${item.price} ₽</div>
                                </div>
                                <div class="gift-actions">
                                    <button class="action-btn" onclick="event.stopPropagation(); reserveGift(${item.id})">🎁 Хочу подарить</button>
                                    <button class="action-btn" onclick="event.stopPropagation(); copyToMe(${item.id})">📋 Добавить к себе</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;
        }
        
        async function addGift() {
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const link = document.getElementById('itemLink').value.trim();
            
            if (!name) { alert('Введите название подарка'); return; }
            
            const giftData = { 
                gift_name: name, 
                price: price ? parseInt(price) : 0, 
                visibility: "all" 
            };
            if (link) giftData.gift_link = link;
            
            try {
                await fetch(`${API_BASE}/wishlist/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(giftData)
                });
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                document.getElementById('itemLink').value = '';
                await loadMyWishlist();
            } catch(e) { alert('Ошибка добавления'); }
        }
        
        function openModal(index, type) {
            const item = type === 'my' ? myWishlist[index] : currentFriendWishlist[index];
            if (!item) return;
            document.getElementById('modalTitle').innerText = item.name;
            document.getElementById('modalPrice').innerText = `${item.price} ₽`;
            document.getElementById('modalDesc').innerText = item.description || 'Нет описания';
            document.getElementById('modalImage').innerHTML = item.photo_url ? `<img src="${item.photo_url}">` : '🎁';
            
            const buttonsDiv = document.getElementById('modalButtons');
            if (type === 'my') {
                buttonsDiv.innerHTML = `<button class="modal-btn" onclick="window.open('${item.link || '#'}', '_blank')">🛒 Где купить</button>`;
            } else {
                buttonsDiv.innerHTML = `
                    <button class="modal-btn" onclick="reserveGift(${item.id}); closeModal();">🎁 Хочу подарить</button>
                    <button class="modal-btn" onclick="copyToMe(${item.id}); closeModal();">📋 Добавить к себе</button>
                    ${item.link ? `<button class="modal-btn gray" onclick="window.open('${item.link}', '_blank')">🛒 Где купить</button>` : ''}
                `;
            }
            document.getElementById('modal').style.display = 'block';
        }
        
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        async function reserveGift(wishlistId) {
            alert(`🎁 Резерв подарка ${wishlistId} заработает, когда Саша добавит эндпоинт /reserve_gift`);
        }
        
        async function copyToMe(wishlistId) {
            alert(`📋 Копирование подарка ${wishlistId} заработает после доработки API`);
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'my' && i === 0) || (tab === 'friends' && i === 1));
            });
            document.getElementById('mySection').style.display = tab === 'my' ? 'block' : 'none';
            document.getElementById('friendsSection').style.display = tab === 'friends' ? 'block' : 'none';
            if (tab === 'friends') loadFriendsList();
        }
        
        function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    </script>
</body>
</html>
