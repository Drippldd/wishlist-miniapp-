<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Вишлист</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #FF6B00;
      --orange-light: #FFF0E5;
      --green: #34C759;
      --green-light: #E5F5E8;
      --red: #FF3B30;
      --red-light: #FFE5E5;
      --text-dark: #1A1A1A;
      --text-gray: #666666;
      --border: #EEEEEE;
      --white: #FFFFFF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #FEFAF5;
      padding: 16px;
      padding-bottom: 40px;
    }

    .header { margin-bottom: 20px; }
    .header h1 { font-size: 28px; font-weight: 700; color: var(--text-dark); }
    .header p { color: var(--text-gray); font-size: 13px; margin-top: 4px; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--white);
      padding: 4px;
      border-radius: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      border-radius: 36px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-gray);
    }

    .tab.active {
      background: var(--orange);
      color: white;
    }

    .add-form {
      background: var(--white);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 10px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    .file-picker-btn {
      background: var(--orange-light);
      color: var(--orange);
      padding: 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: inline-block;
      width: 100%;
      text-align: center;
      margin-bottom: 10px;
      border: 1.5px dashed var(--orange);
    }

    .photo-preview {
      margin: 10px 0;
      text-align: center;
    }

    .photo-preview img {
      max-width: 100%;
      max-height: 170px;
      border-radius: 16px;
    }

    .upload-status {
      font-size: 13px;
      color: var(--orange);
      text-align: center;
      margin: 8px 0 12px;
      font-weight: 600;
    }

    .add-btn {
      background: var(--orange);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }

    .add-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .gift-card {
      background: var(--white);
      border-radius: 24px;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .gift-card-content {
      display: flex;
      padding: 14px;
      gap: 14px;
      cursor: pointer;
    }

    .gift-image {
      width: 100px;
      height: 100px;
      background: #F5F5F5;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .gift-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gift-details { flex: 1; }

    .gift-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .gift-price {
      font-weight: 700;
      font-size: 20px;
      color: var(--orange);
      margin-bottom: 8px;
    }

    .gift-desc {
      font-size: 12px;
      color: var(--text-gray);
      margin-bottom: 8px;
    }

    .gift-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .delete-btn, .link-btn {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .delete-btn {
      background: var(--red-light);
      color: var(--red);
      border: 1.5px solid var(--red);
    }

    .link-btn {
      background: var(--orange-light);
      color: var(--orange);
      border: 1.5px solid var(--orange);
    }

    .friend-card {
      background: var(--white);
      border-radius: 20px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .friend-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 22px;
      overflow: hidden;
    }

    .friend-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .friend-info { flex: 1; }
    .friend-name { font-weight: 700; font-size: 16px; }
    .friend-username { font-size: 12px; color: var(--text-gray); }

    .empty, .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-gray);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      margin: 40px auto;
      max-width: 420px;
    }

    .modal-image {
      width: 100%;
      height: 260px;
      background: #F5F5F5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-info {
      padding: 20px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .modal-price {
      font-size: 20px;
      font-weight: 800;
      color: var(--orange);
      margin-bottom: 10px;
    }

    .modal-desc {
      color: var(--text-gray);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .modal-btn {
      flex: 1;
      border: none;
      border-radius: 18px;
      padding: 12px;
      font-weight: 700;
      color: white;
      background: var(--orange);
      cursor: pointer;
    }

    .close-modal {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>🎁 Мой вишлист</h1>
    <p>Подарки, которые я хочу получить</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('my')">Мои подарки</div>
    <div class="tab" onclick="switchTab('friends')">Друзья</div>
  </div>

  <div id="mySection">
    <div class="add-form">
      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
      <button class="file-picker-btn" onclick="document.getElementById('photoInput').click()">📸 Выбрать фото</button>

      <div id="photoPreview" class="photo-preview"></div>
      <div id="uploadStatus" class="upload-status"></div>

      <input type="text" id="itemName" placeholder="Название подарка">
      <input type="text" id="itemPrice" placeholder="Цена">
      <input type="text" id="itemLink" placeholder="Ссылка где купить">
      <textarea id="itemDesc" placeholder="Описание подарка"></textarea>

      <button id="addGiftBtn" class="add-btn" onclick="addGift()">+ Добавить подарок</button>
    </div>

    <div id="myList">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <div id="friendsSection" style="display:none;">
    <div id="friendsList">
      <div class="loading">Загрузка друзей...</div>
    </div>
  </div>

  <div id="modal" class="modal" onclick="if(event.target === this) closeModal()">
    <button class="close-modal" onclick="closeModal()">×</button>
    <div class="modal-content">
      <div class="modal-image" id="modalImage">🎁</div>
      <div class="modal-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-price" id="modalPrice"></div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-buttons" id="modalButtons"></div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_BASE = 'https://birthdaybot-production-2460.up.railway.app';

    const tgUser = tg.initDataUnsafe?.user;
    const userId = tgUser?.id;

    let myWishlist = [];
    let friendsList = [];
    let selectedPhotoUrl = '';
    let isPhotoUploading = false;

    if (!userId) {
      alert('Ошибка: открой Mini App через Telegram-бота');
    } else {
      loadMyWishlist();
      loadFriendsList();
    }

    function setAddButtonState() {
      const btn = document.getElementById('addGiftBtn');

      if (isPhotoUploading) {
        btn.disabled = true;
        btn.innerText = '⏳ Фото загружается...';
      } else {
        btn.disabled = false;
        btn.innerText = '+ Добавить подарок';
      }
    }

    async function compressImage(file, maxWidth = 1200, quality = 0.75) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = function(e) {
          img.src = e.target.result;
        };

        img.onload = function() {
          const canvas = document.createElement('canvas');

          let width = img.width;
          let height = img.height;

          if (width > maxWidth) {
            height = Math.round((height * maxWidth) / width);
            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          canvas.toBlob(
            blob => {
              if (!blob) {
                reject(new Error('Не удалось сжать фото'));
                return;
              }

              const compressedFile = new File(
                [blob],
                file.name.replace(/\.\w+$/, '.jpg'),
                { type: 'image/jpeg' }
              );

              resolve(compressedFile);
            },
            'image/jpeg',
            quality
          );
        };

        img.onerror = reject;
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadPhoto(input) {
      const originalFile = input.files[0];
      if (!originalFile) return;

      const status = document.getElementById('uploadStatus');
      const preview = document.getElementById('photoPreview');

      selectedPhotoUrl = '';
      isPhotoUploading = true;
      setAddButtonState();

      if (!originalFile.type.startsWith('image/')) {
        status.innerHTML = '❌ Выбери именно фото';
        isPhotoUploading = false;
        setAddButtonState();
        return;
      }

      status.innerHTML = '⏳ Сжимаем фото...';

      try {
        const compressedFile = await compressImage(originalFile);

        const reader = new FileReader();
        reader.onload = function(e) {
          preview.innerHTML = `<img src="${e.target.result}" alt="Фото подарка">`;
        };
        reader.readAsDataURL(compressedFile);

        status.innerHTML = '⏳ Загружаем фото...';

        const formData = new FormData();
        formData.append('file', compressedFile);

        const res = await fetch(`${API_BASE}/upload_photo`, {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error('Ошибка сервера при загрузке фото');
        }

        if (!data.url) {
          throw new Error('Сервер не вернул ссылку на фото');
        }

        selectedPhotoUrl = data.url;
        status.innerHTML = '✅ Фото загружено';

      } catch (e) {
        console.error('Ошибка фото:', e);
        selectedPhotoUrl = '';
        status.innerHTML = '❌ Фото не загрузилось: ' + e.message;
      } finally {
        isPhotoUploading = false;
        setAddButtonState();
      }
    }

    async function addGift() {
      const name = document.getElementById('itemName').value.trim();
      const priceRaw = document.getElementById('itemPrice').value.trim();
      const link = document.getElementById('itemLink').value.trim();
      const description = document.getElementById('itemDesc').value.trim();

      if (isPhotoUploading) {
        alert('Подожди, фото ещё загружается');
        return;
      }

      if (!name) {
        alert('Введите название подарка');
        return;
      }

      const giftData = {
        gift_name: name,
        price: priceRaw ? parseInt(priceRaw.replace(/\D/g, ''), 10) || 0 : 0,
        photo_url: selectedPhotoUrl || '',
        gift_link: link,
        description: description,
        visibility: 'all'
      };

      try {
        const res = await fetch(`${API_BASE}/wishlist/${userId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(giftData)
        });

        if (!res.ok) {
          throw new Error('Ошибка добавления подарка');
        }

        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemLink').value = '';
        document.getElementById('itemDesc').value = '';
        document.getElementById('photoInput').value = '';
        document.getElementById('photoPreview').innerHTML = '';
        document.getElementById('uploadStatus').innerHTML = '';

        selectedPhotoUrl = '';

        await loadMyWishlist();
        tg.showAlert('Подарок добавлен 🎉');

      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function loadMyWishlist() {
      try {
        const res = await fetch(`${API_BASE}/wishlist/${userId}`);
        const data = await res.json();

        myWishlist = Array.isArray(data) ? data.map(item => ({
          id: item.id,
          name: item.gift_name || item.name || 'Без названия',
          price: item.price || 0,
          link: item.gift_link || '',
          photo_url: item.photo_url || '',
          description: item.description || ''
        })) : [];

        renderMyWishlist();

      } catch (e) {
        document.getElementById('myList').innerHTML = '<div class="empty">Ошибка загрузки</div>';
      }
    }

    function renderMyWishlist() {
      const container = document.getElementById('myList');

      if (!myWishlist.length) {
        container.innerHTML = '<div class="empty">🎄 Пока нет подарков</div>';
        return;
      }

      container.innerHTML = myWishlist.map((item, index) => `
        <div class="gift-card">
          <div class="gift-card-content" onclick="openModal(${index})">
            <div class="gift-image">
              ${
                item.photo_url
                  ? `<img src="${escapeHtml(item.photo_url)}" onerror="this.parentElement.innerHTML='🎁'">`
                  : '🎁'
              }
            </div>

            <div class="gift-details">
              <div class="gift-title">${escapeHtml(item.name)}</div>
              <div class="gift-price">${escapeHtml(item.price)} ₽</div>

              ${
                item.description
                  ? `<div class="gift-desc">${escapeHtml(item.description)}</div>`
                  : ''
              }

              <div class="gift-actions">
                ${
                  item.link
                    ? `<button class="link-btn" onclick="event.stopPropagation(); openLink('${escapeHtml(item.link)}')">🛒 Где купить</button>`
                    : ''
                }
                <button class="delete-btn" onclick="event.stopPropagation(); deleteGift(${item.id}, ${index})">🗑 Удалить</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openModal(index) {
      const item = myWishlist[index];
      if (!item) return;

      document.getElementById('modalTitle').innerText = item.name;
      document.getElementById('modalPrice').innerText = `${item.price} ₽`;
      document.getElementById('modalDesc').innerText = item.description || 'Нет описания';

      document.getElementById('modalImage').innerHTML = item.photo_url
        ? `<img src="${escapeHtml(item.photo_url)}">`
        : '🎁';

      document.getElementById('modalButtons').innerHTML = `
        ${
          item.link
            ? `<button class="modal-btn" onclick="openLink('${escapeHtml(item.link)}')">🛒 Где купить</button>`
            : ''
        }
        <button class="modal-btn" style="background:#FF3B30" onclick="deleteGift(${item.id}, ${index}); closeModal();">🗑 Удалить</button>
      `;

      document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function deleteGift(giftId, index) {
      if (!confirm('Удалить подарок?')) return;

      try {
        const res = await fetch(`${API_BASE}/wishlist/${userId}/${giftId}`, {
          method: 'DELETE'
        });

        if (!res.ok) {
          throw new Error('Ошибка удаления');
        }

        myWishlist.splice(index, 1);
        renderMyWishlist();

      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    }

    async function loadFriendsList() {
      try {
        const res = await fetch(`${API_BASE}/friends/${userId}`);
        const data = await res.json();

        friendsList = Array.isArray(data) ? data : [];
        renderFriendsList();

      } catch (e) {
        friendsList = [];
        renderFriendsList();
      }
    }

    function renderFriendsList() {
      const container = document.getElementById('friendsList');

      if (!friendsList.length) {
        container.innerHTML = '<div class="empty">👋 Пока нет друзей</div>';
        return;
      }

      container.innerHTML = friendsList.map(friend => {
        const name = friend.first_name || friend.name || 'Друг';
        const username = friend.username || '';
        const photo = friend.photo_url || '';

        return `
          <div class="friend-card">
            <div class="friend-avatar">
              ${
                photo
                  ? `<img src="${escapeHtml(photo)}">`
                  : escapeHtml(name[0] || '?')
              }
            </div>

            <div class="friend-info">
              <div class="friend-name">${escapeHtml(name)}</div>
              ${
                username
                  ? `<div class="friend-username">@${escapeHtml(username)}</div>`
                  : ''
              }
            </div>
          </div>
        `;
      }).join('');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((el, index) => {
        el.classList.toggle('active', tab === 'my' ? index === 0 : index === 1);
      });

      document.getElementById('mySection').style.display = tab === 'my' ? 'block' : 'none';
      document.getElementById('friendsSection').style.display = tab === 'friends' ? 'block' : 'none';

      if (tab === 'friends') {
        loadFriendsList();
      }
    }

    function openLink(url) {
      if (!url) return;

      if (tg.openLink) {
        tg.openLink(url);
      } else {
        window.open(url, '_blank');
      }
    }

    function escapeHtml(value) {
      if (!value) return '';
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
