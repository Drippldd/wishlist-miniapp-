<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вишлист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #FEFAF5;
            padding: 16px;
            padding-bottom: 40px;
        }

        :root {
            --orange: #FF6B00;
            --orange-dark: #E55A00;
            --orange-light: #FFF0E5;
            --green: #34C759;
            --green-light: #E5F5E8;
            --red: #FF3B30;
            --red-light: #FFE5E5;
            --text-dark: #1A1A1A;
            --text-gray: #666666;
            --border: #EEEEEE;
            --white: #FFFFFF;
        }

        .header {
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .header p {
            color: var(--text-gray);
            font-size: 13px;
            margin-top: 4px;
        }

        .back-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .back-header button {
            background: var(--orange-light);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            font-size: 20px;
            cursor: pointer;
            color: var(--orange);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--white);
            padding: 4px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 36px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            background: transparent;
            color: var(--text-gray);
        }

        .tab.active {
            background: var(--orange);
            color: white;
        }

        .gift-card {
            background: var(--white);
            border-radius: 24px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .gift-card-content {
            display: flex;
            padding: 14px;
            gap: 14px;
        }

        .gift-image {
            width: 100px;
            height: 100px;
            background: #F5F5F5;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }

        .gift-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gift-details {
            flex: 1;
        }

        .gift-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 4px;
            cursor: pointer;
        }

        .gift-price {
            font-weight: 700;
            font-size: 18px;
            color: var(--orange);
            margin: 6px 0;
            cursor: pointer;
        }

        .gift-desc {
            font-size: 12px;
            color: var(--text-gray);
            margin-top: 4px;
        }

        .gift-link-btn {
            background: transparent;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: var(--orange);
            cursor: pointer;
            border: 1.5px solid var(--orange);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .delete-btn {
            background: var(--red-light);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: var(--red);
            cursor: pointer;
            border: 1.5px solid var(--red);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 8px;
        }

        .gift-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: transparent;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            color: var(--orange);
            cursor: pointer;
            border: 1.5px solid var(--orange);
        }

        .action-btn.reserved {
            background: var(--green-light);
            border-color: var(--green);
            color: var(--green);
        }

        .friend-card {
            background: var(--white);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .friend-avatar {
            width: 52px;
            height: 52px;
            background: var(--orange);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 22px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-dark);
        }

        .friend-username {
            font-size: 12px;
            color: var(--text-gray);
            margin-top: 2px;
        }

        .add-form {
            background: var(--white);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .add-form input, .add-form textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .add-form textarea {
            resize: vertical;
            min-height: 70px;
        }

        .photo-preview {
            margin: 10px 0;
            text-align: center;
        }

        .photo-preview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 16px;
        }

        .file-picker-btn {
            background: var(--orange-light);
            color: var(--orange);
            padding: 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: inline-block;
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
            border: 1.5px dashed var(--orange);
        }

        .add-btn {
            background: var(--orange);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            border-radius: 28px;
            max-width: 400px;
            margin: 60px auto;
            overflow: hidden;
        }

        .modal-image {
            width: 100%;
            height: 240px;
            background: #F5F5F5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-info {
            padding: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--orange);
            margin: 8px 0;
        }

        .modal-desc {
            color: var(--text-gray);
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .modal-btn {
            flex: 1;
            background: var(--orange);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 19px;
            font-size: 24px;
            cursor: pointer;
        }

        .back-btn {
            background: var(--orange-light);
            color: var(--orange);
            border: none;
            padding: 10px;
            border-radius: 30px;
            font-weight: 600;
            margin-bottom: 16px;
            width: 100%;
            cursor: pointer;
        }

        .loading, .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-gray);
        }

        .upload-status {
            font-size: 12px;
            color: var(--orange);
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="mainHeader" class="header">
        <h1>🎁 Мой вишлист</h1>
        <p>Подарки, которые я хочу получить</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('my')">Мои подарки</div>
        <div class="tab" onclick="switchTab('friends')">Друзья</div>
    </div>

    <div id="mySection">
        <div class="add-form">
            <input type="text" id="itemName" placeholder="Название подарка">
            <input type="text" id="itemPrice" placeholder="Цена">
            
            <button class="file-picker-btn" onclick="pickPhoto()">📸 Выбрать фото из галереи</button>
            <div id="photoPreview" class="photo-preview"></div>
            <div id="uploadStatus" class="upload-status"></div>
            
            <input type="text" id="itemLink" placeholder="Ссылка где купить (необязательно)">
            <textarea id="itemDesc" placeholder="Описание подарка (необязательно)"></textarea>
            <button class="add-btn" onclick="addGift()">+ Добавить подарок</button>
        </div>
        <div id="myList"><div class="loading">Загрузка...</div></div>
    </div>

    <div id="friendsSection" style="display:none;">
        <div id="friendsList"><div class="loading">Загрузка друзей...</div></div>
    </div>

    <div id="modal" class="modal" onclick="if(event.target===this) closeModal()">
        <button class="close-modal" onclick="closeModal()">✕</button>
        <div class="modal-content">
            <div class="modal-image" id="modalImage">🎁</div>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <div class="modal-buttons" id="modalButtons"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const userId = tg.initDataUnsafe?.user?.id;
        const API_BASE = 'https://birthdaybot-production-2460.up.railway.app';
        
        let myWishlist = [];
        let friendsList = [];
        let currentFriend = null;
        let currentFriendWishlist = [];
        let selectedPhotoUrl = null;
        let isUploading = false;
        
        if (!userId) {
            alert('Ошибка: не определён пользователь');
        } else {
            loadMyWishlist();
            loadFriendsList();
        }
        
        async function pickPhoto() {
            tg.showFilePicker({
                types: ['image'],
                multiple: false
            }, async (result) => {
                console.log('Результат выбора:', result);
                
                if (result && result.files && result.files.length > 0) {
                    const file = result.files[0];
                    const statusDiv = document.getElementById('uploadStatus');
                    statusDiv.innerHTML = '⏳ Загрузка фото в Telegram Cloud...';
                    
                    try {
                        const uploaded = await tg.uploadFile(file);
                        console.log('Результат uploadFile:', uploaded);
                        
                        if (uploaded && uploaded.url) {
                            selectedPhotoUrl = uploaded.url;
                            const preview = document.getElementById('photoPreview');
                            preview.innerHTML = `<img src="${selectedPhotoUrl}" alt="Предпросмотр" style="max-width:100%;max-height:150px;border-radius:16px;">`;
                            statusDiv.innerHTML = '✅ Фото загружено!';
                            setTimeout(() => { statusDiv.innerHTML = ''; }, 2000);
                        } else {
                            statusDiv.innerHTML = '❌ Не удалось получить ссылку на фото';
                        }
                    } catch (error) {
                        console.error('Ошибка загрузки:', error);
                        statusDiv.innerHTML = '❌ Ошибка загрузки фото: ' + error.message;
                    }
                }
            });
        }
        
        function updateHeaderForFriend(friendName = null) {
            const headerDiv = document.getElementById('mainHeader');
            if (friendName) {
                headerDiv.innerHTML = `
                    <div class="back-header">
                        <button onclick="backToFriendsList()">←</button>
                        <div>
                            <h1>👥 Вишлисты друзей</h1>
                            <p>Подарки ${escapeHtml(friendName)}</p>
                        </div>
                    </div>
                `;
            } else {
                headerDiv.innerHTML = `
                    <h1>🎁 Мой вишлист</h1>
                    <p>Подарки, которые я хочу получить</p>
                `;
            }
        }
        
        function backToFriendsList() {
            currentFriend = null;
            currentFriendWishlist = [];
            updateHeaderForFriend();
            renderFriendsList();
            document.getElementById('friendsSection').style.display = 'block';
            document.getElementById('mySection').style.display = 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[1].classList.add('active');
        }
        
        async function loadMyWishlist() {
            try {
                const res = await fetch(`${API_BASE}/wishlist/${userId}`);
                const data = await res.json();
                myWishlist = Array.isArray(data) ? data.map(item => ({
                    id: item.id,
                    name: item.gift_name,
                    price: item.price || 'не указана',
                    link: item.gift_link || '',
                    photo_url: item.photo_url || '',
                    description: item.description || ''
                })) : [];
                renderMyWishlist();
            } catch(e) {
                document.getElementById('myList').innerHTML = '<div class="empty">Ошибка загрузки</div>';
            }
        }
        
        async function deleteGift(giftId, index) {
            if (!confirm('Удалить этот подарок?')) return;
            try {
                const response = await fetch(`${API_BASE}/wishlist/${userId}/${giftId}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    myWishlist.splice(index, 1);
                    renderMyWishlist();
                } else {
                    alert('Ошибка при удалении');
                }
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        function renderMyWishlist() {
            const container = document.getElementById('myList');
            if (!myWishlist.length) {
                container.innerHTML = '<div class="empty">🎄 Пока нет подарков</div>';
                return;
            }
            container.innerHTML = myWishlist.map((item, i) => `
                <div class="gift-card">
                    <div class="gift-card-content">
                        <div class="gift-image" onclick="openModal(${i}, 'my')">
                            ${item.photo_url ? `<img src="${item.photo_url}" onerror="this.parentElement.innerHTML='🎁'">` : '🎁'}
                        </div>
                        <div class="gift-details">
                            <div class="gift-title" onclick="openModal(${i}, 'my')">${escapeHtml(item.name)}</div>
                            <div class="gift-price" onclick="openModal(${i}, 'my')">${item.price} ₽</div>
                            ${item.description ? `<div class="gift-desc">${escapeHtml(item.description.substring(0, 50))}${item.description.length > 50 ? '...' : ''}</div>` : ''}
                            <div class="gift-actions">
                                ${item.link ? `<button class="gift-link-btn" onclick="event.stopPropagation(); window.open('${item.link}', '_blank')">🛒 Где купить</button>` : ''}
                                <button class="delete-btn" onclick="event.stopPropagation(); deleteGift(${item.id}, ${i})">🗑 Удалить</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadFriendsList() {
            try {
                const res = await fetch(`${API_BASE}/friends/${userId}`);
                const data = await res.json();
                if (Array.isArray(data) && data.length > 0) {
                    friendsList = data;
                } else {
                    friendsList = [];
                }
                renderFriendsList();
            } catch(e) {
                console.error('Ошибка загрузки друзей:', e);
                friendsList = [];
                renderFriendsList();
            }
        }
        
        function renderFriendsList() {
            const container = document.getElementById('friendsList');
            if (!friendsList.length) {
                container.innerHTML = '<div class="empty">👋 Пока нет друзей</div>';
                return;
            }
            container.innerHTML = friendsList.map(friend => `
                <div class="friend-card" onclick="loadFriendWishlist(${friend.user_id}, '${escapeHtml(friend.first_name || 'Друг')}', '${escapeHtml(friend.username || '')}')">
                    <div class="friend-avatar">${(friend.first_name?.[0] || '?').toUpperCase()}</div>
                    <div class="friend-info">
                        <div class="friend-name">${escapeHtml(friend.first_name || 'Друг')}</div>
                        ${friend.username ? `<div class="friend-username">@${friend.username}</div>` : ''}
                    </div>
                    <div style="color:var(--orange);">→</div>
                </div>
            `).join('');
        }
        
        async function loadFriendWishlist(friendId, friendName, friendUsername) {
            currentFriend = { id: friendId, name: friendName, username: friendUsername };
            updateHeaderForFriend(friendName);
            
            try {
                const res = await fetch(`${API_BASE}/wishlist/${friendId}`);
                const data = await res.json();
                currentFriendWishlist = Array.isArray(data) ? data.map(item => ({
                    id: item.id,
                    name: item.gift_name,
                    price: item.price || 'не указана',
                    link: item.gift_link || '',
                    photo_url: item.photo_url || '',
                    description: item.description || ''
                })) : [];
                renderFriendsWishlist();
            } catch(e) {
                console.error('Ошибка загрузки подарков друга:', e);
                currentFriendWishlist = [];
                renderFriendsWishlist();
            }
            
            document.getElementById('friendsSection').style.display = 'block';
            document.getElementById('mySection').style.display = 'none';
        }
        
        function renderFriendsWishlist() {
            const container = document.getElementById('friendsList');
            if (!currentFriendWishlist.length) {
                container.innerHTML = `
                    <button class="back-btn" onclick="backToFriendsList()">← Назад к друзьям</button>
                    <div class="empty">🎁 У ${escapeHtml(currentFriend.name)} пока нет подарков</div>
                `;
                return;
            }
            container.innerHTML = `
                <button class="back-btn" onclick="backToFriendsList()">← Назад к друзьям</button>
                ${currentFriendWishlist.map((item, i) => `
                    <div class="gift-card">
                        <div class="gift-card-content">
                            <div class="gift-image" onclick="openModalFriend(${i})">
                                ${item.photo_url ? `<img src="${item.photo_url}" onerror="this.parentElement.innerHTML='🎁'">` : '🎁'}
                            </div>
                            <div class="gift-details">
                                <div class="gift-title" onclick="openModalFriend(${i})">${escapeHtml(item.name)}</div>
                                <div class="gift-price" onclick="openModalFriend(${i})">${item.price} ₽</div>
                                <div class="gift-actions">
                                    <button class="action-btn" onclick="event.stopPropagation(); reserveGift(${item.id}, this)">🎁 Хочу подарить</button>
                                    <button class="action-btn" onclick="event.stopPropagation(); copyToMe(${item.id})">📋 Добавить к себе</button>
                                    ${item.link ? `<button class="gift-link-btn" onclick="event.stopPropagation(); window.open('${item.link}', '_blank')">🛒 Где купить</button>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;
        }
        
        function openModalFriend(index) {
            openModal(index, 'friend');
        }
        
        async function addGift() {
            if (isUploading) {
                alert('Подождите, фото загружается...');
                return;
            }
            
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const link = document.getElementById('itemLink').value.trim();
            const description = document.getElementById('itemDesc').value.trim();
            
            if (!name) { alert('Введите название подарка'); return; }
            
            const giftData = { 
                gift_name: name, 
                price: price ? parseInt(price) : 0, 
                visibility: "all",
                gift_link: link || '',
                photo_url: selectedPhotoUrl || '',
                description: description || ''
            };
            
            try {
                const response = await fetch(`${API_BASE}/wishlist/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(giftData)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                document.getElementById('itemLink').value = '';
                document.getElementById('itemDesc').value = '';
                document.getElementById('photoPreview').innerHTML = '';
                selectedPhotoUrl = null;
                
                await loadMyWishlist();
                alert('Подарок добавлен!');
            } catch(e) { 
                alert('Ошибка добавления: ' + e.message);
            }
        }
        
        function reserveGift(giftId, buttonElement) {
            alert(`⚠️ Функция резерва подарка будет работать, когда Саша добавит эндпоинт POST /reserve_gift/{wishlist_id}`);
        }
        
        async function copyToMe(giftId) {
            const gift = currentFriendWishlist.find(g => g.id === giftId);
            if (!gift) return;
            
            const giftData = {
                gift_name: gift.name,
                price: typeof gift.price === 'number' ? gift.price : parseInt(gift.price) || 0,
                visibility: "all",
                gift_link: gift.link || '',
                photo_url: gift.photo_url || '',
                description: gift.description || ''
            };
            
            try {
                await fetch(`${API_BASE}/wishlist/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(giftData)
                });
                alert('Подарок добавлен в ваш вишлист!');
                await loadMyWishlist();
            } catch(e) {
                alert('Ошибка при копировании: ' + e.message);
            }
        }
        
        function openModal(index, type) {
            const item = type === 'my' ? myWishlist[index] : currentFriendWishlist[index];
            if (!item) return;
            document.getElementById('modalTitle').innerText = item.name;
            document.getElementById('modalPrice').innerText = `${item.price} ₽`;
            document.getElementById('modalDesc').innerText = item.description || 'Нет описания';
            document.getElementById('modalImage').innerHTML = item.photo_url ? `<img src="${item.photo_url}">` : '🎁';
            
            const buttonsDiv = document.getElementById('modalButtons');
            if (type === 'my') {
                buttonsDiv.innerHTML = `
                    <button class="modal-btn" onclick="window.open('${item.link || '#'}', '_blank')">🛒 Где купить</button>
                    <button class="modal-btn" style="background:#FF3B30" onclick="deleteGift(${item.id}, ${index}); closeModal();">🗑 Удалить</button>
                `;
            } else {
                buttonsDiv.innerHTML = `
                    <button class="modal-btn" onclick="reserveGift(${item.id}); closeModal();">🎁 Хочу подарить</button>
                    <button class="modal-btn" onclick="copyToMe(${item.id}); closeModal();">📋 Добавить к себе</button>
                    ${item.link ? `<button class="modal-btn" onclick="window.open('${item.link}', '_blank')">🛒 Где купить</button>` : ''}
                `;
            }
            document.getElementById('modal').style.display = 'block';
        }
        
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function switchTab(tab) {
            if (currentFriend) {
                backToFriendsList();
                return;
            }
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'my' && i === 0) || (tab === 'friends' && i === 1));
            });
            document.getElementById('mySection').style.display = tab === 'my' ? 'block' : 'none';
            document.getElementById('friendsSection').style.display = tab === 'friends' ? 'block' : 'none';
            if (tab === 'friends') loadFriendsList();
        }
        
        function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    </script>
</body>
</html>
