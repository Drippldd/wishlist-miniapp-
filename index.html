<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой вишлист</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            padding: 20px;
            padding-bottom: 40px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subtitle {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 24px;
            border-left: 3px solid #007aff;
            padding-left: 12px;
        }
        .add-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        .add-section input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
            background: #f9f9fb;
        }
        .add-section input:focus {
            outline: none;
            border-color: #007aff;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .delete-btn {
            background: #ff3b30;
            padding: 8px 16px;
            font-size: 14px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .card-info { flex: 1; }
        .card-name { font-weight: 600; font-size: 17px; margin-bottom: 4px; }
        .card-price { color: #8e8e93; font-size: 14px; }
        .empty-state {
            text-align: center;
            color: #8e8e93;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            margin-top: 20px;
        }
        .empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }
        .error {
            background: #ffe5e5;
            color: #ff3b30;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <h1><span>🎁</span> Мой вишлист</h1>
    <div class="subtitle">Подарки, которые я хочу получить</div>
    
    <div id="errorMsg" class="error"></div>
    
    <div class="add-section">
        <input type="text" id="itemName" placeholder="Название подарка">
        <input type="text" id="itemPrice" placeholder="Цена">
        <input type="text" id="itemLink" placeholder="Ссылка (необязательно)">
        <button onclick="addGift()" style="width: 100%;">➕ Добавить подарок</button>
    </div>
    
    <div id="list"><div class="loading">Загрузка вишлиста...</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        const userId = tg.initDataUnsafe?.user?.id;
        const API_BASE = 'https://birthdaybot-production-2460.up.railway.app';
        
        let wishlist = [];
        
        if (!userId) {
            showError('Ошибка: не удалось определить пользователя. Открой Mini App через Telegram.');
        } else {
            loadWishlist();
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        
        async function loadWishlist() {
            try {
                const response = await fetch(`${API_BASE}/wishlist/${userId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                wishlist = data.map(item => ({
                    id: item.id,
                    name: item.gift_name,
                    price: item.price || 'не указана',
                    link: item.gift_link || ''
                }));
                render();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                renderError('Не удалось загрузить вишлист. Проверь интернет или API.');
            }
        }
        
        async function addGift() {
            const name = document.getElementById('itemName').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            const link = document.getElementById('itemLink').value.trim();
            
            if (!name) {
                alert('Введите название подарка');
                return;
            }
            
            const giftData = { gift_name: name, price: price ? parseInt(price) : 0, visibility: "all" };
            if (link) giftData.gift_link = link;
            
            try {
                const response = await fetch(`${API_BASE}/wishlist/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(giftData)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                document.getElementById('itemLink').value = '';
                await loadWishlist();
            } catch (error) {
                console.error('Ошибка добавления:', error);
                showError('Не удалось добавить подарок');
            }
        }
        
        async function removeItem(index) {
            const item = wishlist[index];
            if (!item?.id) return;
            if (!confirm(`Удалить "${item.name}"?`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/wishlist/${userId}/${item.id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                await loadWishlist();
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showError('Не удалось удалить подарок');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function renderError(msg) {
            document.getElementById('list').innerHTML = `<div class="empty-state"><span>⚠️</span>${escapeHtml(msg)}</div>`;
        }
        
        function render() {
            const container = document.getElementById('list');
            if (!wishlist.length) {
                container.innerHTML = `<div class="empty-state"><span>🎄</span>Пока нет подарков<br>Добавьте первый выше</div>`;
                return;
            }
            container.innerHTML = wishlist.map((item, i) => `
                <div class="card">
                    <div class="card-info">
                        <div class="card-name">${escapeHtml(item.name)}</div>
                        <div class="card-price">${escapeHtml(item.price)} ₽</div>
                        ${item.link ? `<div style="font-size:12px;margin-top:4px;">🔗 <a href="${escapeHtml(item.link)}" target="_blank">Ссылка</a></div>` : ''}
                    </div>
                    <button class="delete-btn" onclick="removeItem(${i})">🗑 Удалить</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
